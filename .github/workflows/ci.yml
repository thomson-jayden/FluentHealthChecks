name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.x'

jobs:
  restore:
    name: Restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: bash scripts/restore.sh
      - name: Upload restore artifact
        uses: actions/upload-artifact@v4
        with:
          name: obj-dirs
          path: '**/obj'

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: restore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Download restore artifact
        uses: actions/download-artifact@v4
        with:
          name: obj-dirs
      - name: Build
        run: bash scripts/build.sh
      - name: Test
        run: bash scripts/test.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Lint
        run: bash scripts/lint.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: restore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Download restore artifact
        uses: actions/download-artifact@v4
        with:
          name: obj-dirs
      - name: Security Scan
        run: bash scripts/security-scan.sh
