name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.x'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('FluentHealthChecks.slnx', '**/*.csproj', '**/Directory.Build.props', '**/Directory.Build.targets', 'NuGet.config', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore
        run: bash scripts/restore.sh
      - name: Build
        run: bash scripts/build.sh
      - name: Test
        run: bash scripts/test.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('FluentHealthChecks.slnx', '**/*.csproj', '**/Directory.Build.props', '**/Directory.Build.targets', 'NuGet.config', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore
        run: bash scripts/restore.sh
      - name: Lint
        run: bash scripts/lint.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('FluentHealthChecks.slnx', '**/*.csproj', '**/Directory.Build.props', '**/Directory.Build.targets', 'NuGet.config', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore
        run: bash scripts/restore.sh
      - name: Security Scan
        run: bash scripts/security-scan.sh
